<body>
  <h1>Find Safe Water</h1>
  <p>1. Prefer sealed bottles when available.</p>
  <p>2. Boil water for at least one minute.</p>
  <p>3. Use cloth pre-filtering before boiling if cloudy.</p>
  <p>4. Store in clean, covered containers.</p>
