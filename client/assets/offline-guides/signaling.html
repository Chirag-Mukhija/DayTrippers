  <h1>Signaling Rescuers</h1>
  <p>1. Use whistles in three short bursts.</p>
  <p>2. Use flashlight at night to create regular flashes.</p>
  <p>3. Use bright cloth or mirrors in daylight.</p>
  <p>4. Stay visible and avoid unnecessary movement.</p>
