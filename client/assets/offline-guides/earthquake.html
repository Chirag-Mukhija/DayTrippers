<head><meta charset="utf-8"><title>Earthquake Survival</title></head>
<body>
  <h1>Earthquake Survival</h1>
  <p>1. Drop to hands and knees.</p>
  <p>2. Cover your head and neck.</p>
  <p>3. Hold on until shaking stops.</p>
  <p>4. Move away from damaged structures carefully.</p>
