<body>
  <h1>Burn Care</h1>
  <p>1. Cool the burn under clean running water for 20 minutes.</p>
  <p>2. Remove tight items before swelling starts.</p>
  <p>3. Cover with a sterile non-stick dressing.</p>
  <p>4. Do not apply ice, butter, or toothpaste.</p>
</body>
